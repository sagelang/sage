name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04  # Older glibc for broader compatibility
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-22.04-arm  # Native ARM64 runner

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build sage CLI
        run: |
          cargo build --release --target ${{ matrix.target }} -p sage-cli

      - name: Build toolchain
        run: |
          bash scripts/build-toolchain.sh

      - name: Package distribution
        run: |
          DIST_NAME="sage-${{ github.ref_name }}-${{ matrix.target }}"
          mkdir -p "$DIST_NAME/bin"
          mkdir -p "$DIST_NAME/toolchain"

          # Copy sage binary
          cp "target/${{ matrix.target }}/release/sage" "$DIST_NAME/bin/"

          # Copy toolchain
          cp -r "dist/${{ matrix.target }}/"* "$DIST_NAME/toolchain/"

          # Create tarball
          tar -czvf "$DIST_NAME.tar.gz" "$DIST_NAME"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sage-${{ matrix.target }}
          path: sage-*.tar.gz

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.tar.gz
          generate_release_notes: true
          body: |
            ## Installation

            ```bash
            curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/scripts/install.sh | bash
            ```

            Or download manually for your platform:

            | Platform | Download |
            |----------|----------|
            | macOS (Apple Silicon) | `sage-${{ github.ref_name }}-aarch64-apple-darwin.tar.gz` |
            | Linux (x86_64) | `sage-${{ github.ref_name }}-x86_64-unknown-linux-gnu.tar.gz` |
            | Linux (ARM64) | `sage-${{ github.ref_name }}-aarch64-unknown-linux-gnu.tar.gz` |

            Add `export SAGE_TOOLCHAIN=/usr/local/sage/toolchain` to your shell profile for fast builds.
